<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A small file editor built with Alpine.js."
    />
    <title>Alpine Paper — File editor</title>
    <link rel="stylesheet" href="./styles.css" />

    <!-- Register our component before Alpine initializes. -->
    <script defer src="./app.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div
      class="app"
      x-data="fileEditor"
      @keydown.window="handleShortcut($event)"
      @beforeunload.window="warnBeforeLeaving($event)"
      x-cloak
    >
      <header class="toolbar">
        <div class="file-info">
          <div class="logo" aria-hidden="true">A</div>
          <div class="file-copy">
            <div class="file-title">
              <strong x-text="fileName"></strong>
              <span
                class="dirty-indicator"
                x-show="dirty"
                aria-label="Unsaved changes"
              ></span>
            </div>
            <span x-text="message"></span>
          </div>
        </div>

        <div class="actions">
          <button class="button secondary" @click="openFile()">Open</button>
          <button class="button secondary" @click="saveAs()">
            <span x-text="supportsSavePicker ? 'Save as' : 'Download'"></span>
          </button>
          <button
            class="button primary"
            @click="save()"
            :disabled="saveState === 'saving'"
            x-text="saveButtonLabel"
          ></button>
        </div>

        <input
          x-ref="fileInput"
          type="file"
          accept=".txt,.md,.markdown,text/plain,text/markdown"
          @change="loadSelectedFile($event)"
          hidden
        />
      </header>

      <main>
        <section class="document">
          <div class="document-toolbar">
            <div class="tabs" role="tablist" aria-label="Document view">
              <button
                class="tab"
                :class="{ active: view === 'edit' }"
                :aria-selected="view === 'edit'"
                @click="view = 'edit'"
                role="tab"
              >
                Edit
              </button>
              <button
                class="tab"
                :class="{ active: view === 'preview' }"
                :aria-selected="view === 'preview'"
                @click="view = 'preview'"
                role="tab"
              >
                Preview
              </button>
            </div>
            <span class="stats" x-text="stats"></span>
          </div>

          <div class="document-body">
            <textarea
              x-ref="editor"
              x-model="contents"
              x-show="view === 'edit'"
              @input="markEditing()"
              aria-label="Document contents"
              spellcheck="true"
              placeholder="Start writing…"
            ></textarea>

            <pre
              class="preview"
              x-show="view === 'preview'"
              x-text="`Preview\n\n${contents}`"
            ></pre>
          </div>

          <footer class="document-footer">
            <span x-text="fileType"></span>
            <span>Ctrl/Cmd + S to save</span>
          </footer>
        </section>
      </main>
    </div>
  </body>
</html>
