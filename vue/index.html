<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A small file editor built with Vue." />
    <title>Vue Paper — File editor</title>
    <link rel="stylesheet" href="./styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/vue@3.5.39/dist/vue.global.prod.js"
    ></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div id="app" class="app" v-cloak>
      <header class="toolbar">
        <div class="file-info">
          <div class="logo" aria-hidden="true">V</div>
          <div class="file-copy">
            <div class="file-title">
              <strong>{{ fileName }}</strong>
              <span
                v-show="dirty"
                class="dirty-indicator"
                aria-label="Unsaved changes"
              ></span>
            </div>
            <span>{{ message }}</span>
          </div>
        </div>

        <div class="actions">
          <button class="button secondary" @click="openFile">Open</button>
          <button class="button secondary" @click="saveAs">
            {{ supportsSavePicker ? "Save as" : "Download" }}
          </button>
          <button
            class="button primary"
            @click="save"
            :disabled="saveState === 'saving'"
          >
            {{ saveButtonLabel }}
          </button>
        </div>

        <input
          ref="fileInput"
          type="file"
          accept=".txt,.md,.markdown,text/plain,text/markdown"
          @change="loadSelectedFile"
          hidden
        />
      </header>

      <main>
        <section class="document">
          <div class="document-toolbar">
            <div class="tabs" role="tablist" aria-label="Document view">
              <button
                class="tab"
                :class="{ active: view === 'edit' }"
                :aria-selected="view === 'edit'"
                @click="view = 'edit'"
                role="tab"
              >
                Edit
              </button>
              <button
                class="tab"
                :class="{ active: view === 'preview' }"
                :aria-selected="view === 'preview'"
                @click="view = 'preview'"
                role="tab"
              >
                Preview
              </button>
            </div>
            <span class="stats">{{ stats }}</span>
          </div>

          <div class="document-body">
            <textarea
              ref="editor"
              v-model="contents"
              v-show="view === 'edit'"
              @input="markEditing"
              aria-label="Document contents"
              spellcheck="true"
              placeholder="Start writing…"
            ></textarea>
            <pre
              v-show="view === 'preview'"
              class="preview"
              v-text="previewText"
            ></pre>
          </div>

          <footer class="document-footer">
            <span>{{ fileType }}</span>
            <span>Ctrl/Cmd + S to save</span>
          </footer>
        </section>
      </main>
    </div>
  </body>
</html>
